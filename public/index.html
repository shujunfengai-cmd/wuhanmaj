<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>武汉麻将</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <div id="home-screen" class="screen active">
      <h1>武汉麻将</h1>
      <div class="home-actions">
        <input type="text" id="player-name" placeholder="输入你的昵称" maxlength="10">
        <button id="btn-create-room" class="btn-primary">创建房间</button>
        <div class="divider">或</div>
        <input type="text" id="room-code" placeholder="输入4位房间口令" maxlength="4">
        <button id="btn-join-room" class="btn-secondary">加入房间</button>
      </div>
      <div id="home-error" class="error-msg"></div>
    </div>

    <!-- 等待房间 -->
    <div id="room-screen" class="screen">
      <h2>房间 <span id="room-code-display"></span></h2>
      <div id="share-link" class="share-box"></div>
      <div id="players-list" class="players-grid"></div>
      <button id="btn-start-game" class="btn-primary hidden">开始游戏</button>
      <div id="waiting-msg">等待其他玩家加入...</div>
      <button id="btn-leave-room" class="btn-text">离开房间</button>
    </div>

    <!-- 游戏桌面 -->
    <div id="game-screen" class="screen">
      <div class="game-top">
        <div id="game-info">
          <span id="laizi-display">赖子: -</span>
          <span id="pizi-display">皮子: -</span>
          <span id="remaining-display">剩余: -</span>
        </div>
        <div id="turn-indicator">-</div>
      </div>

      <div class="game-table">
        <!-- 其他玩家 -->
        <div id="opponents-area"></div>

        <!-- 出牌区 -->
        <div id="discard-area">
          <div id="last-played">-</div>
        </div>
      </div>

      <!-- 我的手牌区 -->
      <div id="my-area">
        <div id="my-melds"></div>
        <div id="my-hand"></div>
        <div id="action-buttons" class="hidden">
          <button id="btn-chi" class="hidden">吃</button>
          <button id="btn-peng" class="hidden">碰</button>
          <button id="btn-gang" class="hidden">杠</button>
          <button id="btn-pizi-gang" class="hidden">皮子杠</button>
          <button id="btn-hu" class="hidden">胡</button>
          <button id="btn-skip" class="hidden">过</button>
        </div>
      </div>
    </div>

    <!-- 结算界面 -->
    <div id="result-screen" class="screen">
      <h2>本局结束</h2>
      <div id="result-content"></div>
      <button id="btn-back-home" class="btn-primary">返回首页</button>
    </div>
  </div>

  <script src="js/socket-client.js"></script>
  <script src="js/room-ui.js"></script>
  <script src="js/game-ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
